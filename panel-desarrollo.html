<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e70c8">
    <title>Panel Desarrollo - Panter Studio</title>
    <link rel="icon" href="https://i.imgur.com/GYjAGS7.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/firebase-config.js"></script>
</head>
<body class="dev-page">
    <main class="devhub-shell">
        <section class="devhub-gate" id="devHubGate">
            <img src="https://i.imgur.com/GYjAGS7.png" alt="Logo Panter Studio" class="dev-logo">
            <h1>Panel Desarrollo</h1>
            <p id="devHubGateMessage" class="dev-message">Verificando permisos...</p>
        </section>

        <section class="devhub-panel" id="devHubPanel" hidden>
            <header class="devhub-topbar">
                <div>
                    <h2>Proyectos En Desarrollo</h2>
                    <p>Selecciona un juego o aplicación activa para entrar a su panel técnico de desarrollo.</p>
                </div>
                <div class="devhub-top-actions">
                    <button id="devHubGoAdminBtn" class="btn">Volver al Admin</button>
                    <button id="devHubReloadBtn" class="btn">Recargar proyectos</button>
                    <button id="devHubLogoutBtn" class="btn">Cerrar sesion</button>
                </div>
            </header>

            <section class="devhub-meta-row">
                <article class="devhub-stat">
                    <span>Total proyectos</span>
                    <strong id="devHubTotalProjects">0</strong>
                </article>
                <article class="devhub-stat">
                    <span>Juegos activos</span>
                    <strong id="devHubGamesCount">0</strong>
                </article>
                <article class="devhub-stat">
                    <span>Apps activas</span>
                    <strong id="devHubAppsCount">0</strong>
                </article>
            </section>

            <section class="devhub-filter-row">
                <input type="search" id="devHubSearch" placeholder="Buscar proyecto por nombre, tipo o estado">
                <select id="devHubTypeFilter">
                    <option value="all">Todos</option>
                    <option value="juego">Juegos</option>
                    <option value="aplicacion">Aplicaciones</option>
                </select>
            </section>

            <p id="devHubMessage" class="dev-message"></p>

            <section id="devHubProjectsGrid" class="devhub-projects-grid"></section>
        </section>
    </main>

    <script src="assets/js/panel-desarrollo.js"></script>
</body>
</html>
