    <link rel="stylesheet" href="../assets/css/style.css">

    <script src="../assets/js/site-visibility.js"></script>
</head>
<body data-site-root="..">
    <div id="tsparticles"></div>
    <header>
        <img src="https://i.imgur.com/GYjAGS7.png" alt="Logo Panter Studio" class="logo-img">
        <button id="dark-mode-toggle" class="dark-mode-toggle">🌙</button>
    </header>

    <nav>
        <a href="../index.html">Inicio</a>

            <button type="button" class="nav-dropdown-toggle" aria-haspopup="true" aria-expanded="false">Aplicaciones</button>

                <a href="juegos.html">Juegos</a>
                <a href="aplicaciones.html">Aplicaciones</a>

        <a href="minijuegos.html">Minijuegos</a>
        <a href="actualizaciones.html">Actualizaciones</a>

        <a href="personal.html">Personal</a>
        <a href="perfil.html" class="active">Mi Perfil</a>
        <a href="preregistro.html">Pre-registro</a>
    </nav>

    <div class="container profile-shell">
        <section class="profile-auth-section">
            <div class="profile-auth-card profile-auth-card--centered">
                <img src="https://media.discordapp.net/attachments/1475940325280321556/1482731754845638717/SFPS.png?ex=69b9568e&is=69b8050e&hm=79eb602ee4f4028860ecc07bd7b7f8787b8235c7dee065274be317c823a95564&=&format=webp&quality=lossless&width=120&height=120" alt="Logo" class="profile-auth-logo">
                <h1 class="profile-auth-title">Bienvenido a tu perfil</h1>
                <p class="profile-auth-desc">Accede para ver tu información, progreso, recompensas y mucho más en Panter Studio.</p>
                <div class="profile-auth-actions" id="authActions">
                    <button class="btn btn-primary" id="showLogin">Iniciar Sesión</button>
                    <button class="btn btn-secondary" id="showRegister">Crear Cuenta</button>
                </div>
                <form id="loginForm" class="profile-auth-form" style="display:none;flex-direction:column;gap:1.1rem;margin-top:1.5rem;">
                    <input type="email" placeholder="Correo electrónico" required class="profile-input">
                    <input type="password" placeholder="Contraseña" required class="profile-input">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                    <button type="button" class="btn btn-secondary" id="backToAuth1">Volver</button>
                </form>
                <form id="registerForm" class="profile-auth-form" style="display:none;flex-direction:column;gap:1.1rem;margin-top:1.5rem;">
                    <input type="email" placeholder="Correo electrónico" required class="profile-input">
                    <input type="password" placeholder="Contraseña (mínimo 6 caracteres)" minlength="6" required class="profile-input">
                    <input type="text" placeholder="Código de referido (opcional)" class="profile-input">
                    <button type="submit" class="btn btn-primary">Crear Cuenta</button>
                    <button type="button" class="btn btn-secondary" id="backToAuth2">Volver</button>
                </form>
                <style>
                .profile-auth-form {
                    display: flex;
                    flex-direction: column;
                    gap: 1.1rem;
                    align-items: stretch;
                }
                .profile-input {
                    padding: 0.8rem 1rem;
                    border-radius: 8px;
                    border: 1.5px solid #232b3b;
                    background: #232b3b;
                    color: #eaf6ff;
                    font-size: 1rem;
                    font-family: inherit;
                    outline: none;
                    transition: border 0.2s;
                }
                .profile-input:focus {
                    border: 1.5px solid #1e70c8;
                }
                </style>
                <script>
                // Mostrar formularios y volver
                document.getElementById('showLogin').onclick = function() {
                    document.getElementById('authActions').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'flex';
                    document.getElementById('registerForm').style.display = 'none';
                };
                document.getElementById('showRegister').onclick = function() {
                    document.getElementById('authActions').style.display = 'none';
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('registerForm').style.display = 'flex';
                };
                document.getElementById('backToAuth1').onclick = function() {
                    document.getElementById('authActions').style.display = 'flex';
                    document.getElementById('loginForm').style.display = 'none';
                };
                document.getElementById('backToAuth2').onclick = function() {
                    document.getElementById('authActions').style.display = 'flex';
                    document.getElementById('registerForm').style.display = 'none';
                };
                </script>
            </div>
        </section>
    </div>
    <style>
    body {
        background: #10131a !important;
        color: #eaf6ff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .profile-shell {
        min-height: 80vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .profile-auth-section {
        width: 100%;
        max-width: 420px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .profile-auth-card--centered {
        background: #181f2a;
        border-radius: 18px;
        box-shadow: 0 8px 32px 0 rgba(30,112,200,0.18), 0 1.5px 0 #232b3b;
        border: 2px solid #232b3b;
        padding: 2.5rem 2rem 2rem 2rem;
        text-align: center;
        max-width: 370px;
        width: 100%;
        color: #eaf6ff;
        box-sizing: border-box;
        animation: fadeInProfile 0.7s cubic-bezier(.4,1.4,.6,1) 1;
    }
    @keyframes fadeInProfile {
        from { opacity: 0; transform: translateY(40px) scale(0.98); }
        to { opacity: 1; transform: none; }
    }
    .profile-auth-logo {
        width: 90px;
        margin-bottom: 1.5rem;
        filter: drop-shadow(0 0 16px #1e70c8cc);
    }
    .profile-auth-title {
        color: #7ecbff;
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 1px;
        margin-bottom: 0.7rem;
        text-align: center;
        text-shadow: 0 2px 8px #1e70c822;
    }
    .profile-auth-desc {
        color: #b6c8e6;
        font-size: 1.13rem;
        margin-bottom: 2.2rem;
        text-align: center;
    }
    .profile-auth-actions {
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
    }
    .btn {
        padding: 1rem 0;
        border-radius: 10px;
        border: none;
        font-size: 1.13rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s, color 0.2s, box-shadow 0.2s;
        font-family: inherit;
    }
    .btn-primary {
        background: #1e70c8;
        color: #fff;
        border: 1.5px solid #1e70c8;
        box-shadow: 0 2px 8px #1e70c855;
    }
    .btn-primary:hover {
        background: #155a9c;
        color: #fff;
        box-shadow: 0 4px 16px #1e70c888;
    }
    .btn-secondary {
        background: #232b3b;
        color: #7ecbff;
        border: 1.5px solid #1e70c8;
    }
    .btn-secondary:hover {
        background: #1e70c8;
        color: #fff;
    }
    @media (max-width: 600px) {
        .profile-auth-card--centered {
            padding: 1.5rem 0.7rem 1.2rem 0.7rem;
        }
        .profile-auth-section {
            max-width: 98vw;
        }
    }
    </style>

</body>
</html>
