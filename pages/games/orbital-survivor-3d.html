<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e70c8">
    <title>Orbital Survivor 3D - Panter Studio</title>
    <link rel="icon" href="https://i.imgur.com/GYjAGS7.png" type="image/png">
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body class="g3d-body">
    <div id="gameMount" class="g3d-mount"></div>

    <div class="g3d-hud">
        <a href="../minijuegos.html" class="g3d-back">← Volver</a>
        <div class="g3d-stats">
            <span id="gTimer">Tiempo: 75</span>
            <span id="gShield">Escudos: 5</span>
            <span id="gWave">Oleada: 1</span>
            <span id="gCoins">Monedas: 0</span>
            <span id="gEarned">Ganadas: +0</span>
        </div>
    </div>

    <div id="gOverlay" class="g3d-overlay" hidden>
        <h2 id="gTitle">Orbital Survivor 3D</h2>
        <p id="gSubtitle">Mantente en orbita y evita los drones hasta que termine el tiempo.</p>
        <button id="gStartBtn" class="btn">Iniciar partida</button>
    </div>

    <div class="g3d-controls g3d-controls-3">
        <button id="moveLeft" class="g3d-btn">◀</button>
        <button id="boost" class="g3d-btn g3d-btn-accent">BOOST</button>
        <button id="moveRight" class="g3d-btn">▶</button>
    </div>

    <script src="../../assets/js/core/firebase-config.js"></script>
    <script type="module" src="../../assets/js/games/orbital-survivor-3d.js"></script>
</body>
</html>
