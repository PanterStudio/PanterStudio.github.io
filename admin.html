<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e70c8">
    <title>Panel Administrativo - Panter Studio</title>
    <link rel="icon" href="https://i.imgur.com/GYjAGS7.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/firebase-config.js"></script>
</head>
<body class="admin-page">
    <div class="admin-bg-glow"></div>

    <main class="admin-shell">
        <section class="admin-login-card" id="adminLoginCard">
            <img src="https://i.imgur.com/GYjAGS7.png" alt="Logo Panter Studio" class="admin-logo">
            <h1>Panel Administrativo</h1>
            <p>Acceso restringido para gestion interna.</p>

            <form id="adminLoginForm" class="admin-form">
                <label for="adminEmail">Correo</label>
                <input type="email" id="adminEmail" placeholder="tu-correo-admin" required>

                <label for="adminPassword">Contrasena</label>
                <input type="password" id="adminPassword" placeholder="********" required>

                <button type="submit" class="btn">Ingresar</button>
            </form>

            <p id="adminLoginMessage" class="admin-message"></p>
            <a href="index.html" class="admin-back-link">Volver al inicio</a>
        </section>

        <section class="admin-panel" id="adminPanel" hidden>
            <header class="admin-topbar">
                <div>
                    <h2>Dashboard de Pre-registros</h2>
                    <p id="adminDataSource">Fuente de datos: cargando...</p>
                </div>
                <div class="admin-top-actions">
                    <button id="adminRefreshBtn" class="btn">Actualizar</button>
                    <button id="adminExportBtn" class="btn">Exportar CSV</button>
                    <button id="adminLogoutBtn" class="btn">Cerrar sesion</button>
                </div>
            </header>

            <div class="admin-stats-grid">
                <article class="admin-stat-card">
                    <span class="label">Total registrados</span>
                    <strong id="adminTotalRegistros">0</strong>
                </article>
                <article class="admin-stat-card">
                    <span class="label">Disponibles</span>
                    <strong id="adminDisponibles">0</strong>
                </article>
                <article class="admin-stat-card">
                    <span class="label">Capacidad</span>
                    <strong>1000</strong>
                </article>
            </div>

            <section class="admin-table-wrap">
                <h3>Ultimos registros</h3>
                <div class="admin-table-scroll">
                    <table class="admin-table" id="adminTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Correo (oculto)</th>
                                <th>Fecha</th>
                            </tr>
                        </thead>
                        <tbody id="adminTableBody">
                            <tr><td colspan="3">Sin datos</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="admin-games-section">
                <header class="admin-section-header">
                    <h3>Gestion de Juegos</h3>
                    <button id="adminAddGameBtn" class="btn">+ Agregar Juego</button>
                </header>

                <div class="admin-games-grid" id="adminGamesGrid">
                    <p>Cargando juegos...</p>
                </div>

                <dialog id="adminGameModal" class="admin-modal">
                    <form id="adminGameForm" class="admin-modal-form">
                        <h3 id="adminModalTitle">Nuevo Juego</h3>

                        <label for="gameTitle">Titulo *</label>
                        <input type="text" id="gameTitle" required>

                        <label for="gameDescription">Descripcion</label>
                        <textarea id="gameDescription" rows="3"></textarea>

                        <label for="gameImage">URL Imagen</label>
                        <input type="url" id="gameImage" placeholder="https://i.imgur.com/...">

                        <label for="gameStatus">Estado *</label>
                        <select id="gameStatus" required>
                            <option value="planning">Planificacion</option>
                            <option value="development">En Desarrollo</option>
                            <option value="testing">En Pruebas</option>
                            <option value="released">Lanzado</option>
                            <option value="paused">Pausado</option>
                        </select>

                        <label for="gameReleaseDate">Fecha estimada lanzamiento</label>
                        <input type="date" id="gameReleaseDate">

                        <label for="gameTags">Etiquetas (separadas por coma)</label>
                        <input type="text" id="gameTags" placeholder="RPG, 2D, Simulador">

                        <input type="hidden" id="gameId">

                        <div class="admin-modal-actions">
                            <button type="submit" class="btn">Guardar</button>
                            <button type="button" class="btn" onclick="document.getElementById('adminGameModal').close()">Cancelar</button>
                        </div>
                    </form>
                </dialog>
            </section>
        </section>
    </main>

    <script src="assets/js/admin.js"></script>
</body>
</html>
