<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e70c8">
    <title>Panel Proyecto - Panter Studio</title>
    <link rel="icon" href="https://i.imgur.com/GYjAGS7.png" type="image/png">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/firebase-config.js"></script>
</head>
<body class="dev-page">
    <main class="gameproj-shell">
        <section class="gameproj-gate" id="gameProjGate">
            <img src="https://i.imgur.com/GYjAGS7.png" alt="Logo Panter Studio" class="dev-logo">
            <h1>Panel del Proyecto</h1>
            <p id="gameProjGateMessage" class="dev-message">Verificando acceso...</p>
        </section>

        <section class="gameproj-panel" id="gameProjPanel" hidden>
            <header class="gameproj-topbar">
                <div>
                    <span id="gameProjTypeBadge" class="gameproj-badge">Proyecto</span>
                    <h2 id="gameProjTitle">Cargando...</h2>
                    <p id="gameProjStatus">Estado: -</p>
                </div>
                <div class="gameproj-top-actions">
                    <button id="gameProjBackBtn" class="btn">Volver a lista</button>
                    <button id="gameProjReloadBtn" class="btn">Recargar</button>
                    <button id="gameProjLogoutBtn" class="btn">Cerrar sesion</button>
                </div>
            </header>

            <section class="gameproj-kpi-grid">
                <article><span>Tareas totales</span><strong id="gameProjTotalTasks">0</strong></article>
                <article><span>Programacion</span><strong id="gameProjCodeTasks">0</strong></article>
                <article><span>Arte/Modelado</span><strong id="gameProjArtTasks">0</strong></article>
                <article><span>QA/Bugs</span><strong id="gameProjQaTasks">0</strong></article>
            </section>

            <section class="gameproj-main">
                <form id="gameProjTaskForm" class="gameproj-form">
                    <h3>Tarea de desarrollo</h3>
                    <input type="hidden" id="gameProjTaskId">

                    <label for="gameProjTaskTitle">Titulo tecnico</label>
                    <input type="text" id="gameProjTaskTitle" required placeholder="Sistema de inventario: guardar items por slot">

                    <label for="gameProjTaskDiscipline">Disciplina</label>
                    <select id="gameProjTaskDiscipline">
                        <option value="programacion">Programacion</option>
                        <option value="modelado">Modelado</option>
                        <option value="diseno_juego">Diseño de juego</option>
                        <option value="ui_ux">UI/UX</option>
                        <option value="qa_bugs">QA/Bugs</option>
                        <option value="audio">Audio</option>
                    </select>

                    <label for="gameProjTaskStage">Etapa</label>
                    <select id="gameProjTaskStage">
                        <option value="preproduccion">Preproduccion</option>
                        <option value="produccion">Produccion</option>
                        <option value="testing">Testing</option>
                        <option value="polish">Polish</option>
                    </select>

                    <label for="gameProjTaskPriority">Prioridad</label>
                    <select id="gameProjTaskPriority">
                        <option value="alta">Alta</option>
                        <option value="media" selected>Media</option>
                        <option value="baja">Baja</option>
                    </select>

                    <label for="gameProjTaskStatus">Estado de avance</label>
                    <select id="gameProjTaskStatus">
                        <option value="pendiente">Pendiente</option>
                        <option value="en_curso">En curso</option>
                        <option value="bloqueada">Bloqueada</option>
                        <option value="lista_qa">Lista para QA</option>
                        <option value="terminada">Terminada</option>
                    </select>

                    <label for="gameProjTaskDueDate">Fecha objetivo</label>
                    <input type="date" id="gameProjTaskDueDate">

                    <label for="gameProjTaskBuild">Build/Version</label>
                    <input type="text" id="gameProjTaskBuild" placeholder="v0.3.5-alpha">

                    <label for="gameProjTaskDescription">Detalle tecnico</label>
                    <textarea id="gameProjTaskDescription" rows="3" placeholder="Criterios de aceptacion, dependencias y notas tecnicas"></textarea>

                    <div class="gameproj-form-actions">
                        <button type="submit" class="btn">Guardar tarea</button>
                        <button type="button" id="gameProjTaskResetBtn" class="btn">Limpiar</button>
                    </div>
                </form>

                <div class="gameproj-board-area">
                    <section class="gameproj-filters">
                        <input type="search" id="gameProjSearch" placeholder="Buscar tarea por titulo, build o detalle">
                        <select id="gameProjDisciplineFilter">
                            <option value="all">Todas las disciplinas</option>
                            <option value="programacion">Programacion</option>
                            <option value="modelado">Modelado</option>
                            <option value="diseno_juego">Diseño de juego</option>
                            <option value="ui_ux">UI/UX</option>
                            <option value="qa_bugs">QA/Bugs</option>
                            <option value="audio">Audio</option>
                        </select>
                        <p id="gameProjMessage" class="dev-message"></p>
                    </section>

                    <section id="gameProjBoard" class="gameproj-board"></section>
                </div>
            </section>
        </section>
    </main>

    <script src="assets/js/panel-desarrollo-proyecto.js"></script>
</body>
</html>
